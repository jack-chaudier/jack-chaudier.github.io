<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f2e8" />
        <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0e11" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
        />
        <link rel="canonical" href="https://jack-chaudier.github.io/404.html" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <title>404 — Jack Gaffney</title>
        <script>
            (function () {
                const root = document.documentElement;
                root.classList.add("js");
                try {
                    const storedTheme = localStorage.getItem("theme");
                    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    root.setAttribute("data-theme", storedTheme || (prefersDark ? "dark" : "light"));
                } catch (error) {
                    root.setAttribute(
                        "data-theme",
                        window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
                    );
                }
            })();
        </script>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="alternate icon" href="/favicon.ico" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&amp;display=swap"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&amp;display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media='all'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&amp;display=swap"
                rel="stylesheet"
            />
        </noscript>
    </head>
    <body>
        <a href="#main" class="skip-link">Skip to main content</a>
        <main class="page not-found-layout" id="main" tabindex="-1">
            <span class="frame-mark tl" aria-hidden="true">+</span>
            <span class="frame-mark tr" aria-hidden="true">+</span>
            <span class="frame-mark bl" aria-hidden="true">+</span>
            <span class="frame-mark br" aria-hidden="true">+</span>

            <div class="masthead">
                <div class="masthead-left">
                    <span class="wordmark">Jack Gaffney</span>
                    <span class="masthead-sep" aria-hidden="true">·</span>
                    <span class="masthead-meta">Errata</span>
                </div>
                <div class="masthead-right">
                    <button id="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false">
                        <svg class="icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                            <circle cx="12" cy="12" r="4.5"></circle>
                            <line x1="12" y1="2" x2="12" y2="4"></line>
                            <line x1="12" y1="20" x2="12" y2="22"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="2" y1="12" x2="4" y2="12"></line>
                            <line x1="20" y1="12" x2="22" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                            <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <section class="not-found" aria-labelledby="not-found-title">
                <p class="not-found-code">Error 404 · Page not found</p>
                <h1 class="not-found-title" id="not-found-title">
                    Nothing filed <em>under this name.</em>
                </h1>
                <p class="not-found-message">
                    You followed a link that doesn't resolve here. Could be a
                    draft, could be a typo, could be a page I've since retired.
                </p>
                <a href="/" class="not-found-link">
                    <span>Return to portfolio</span>
                    <span aria-hidden="true">↗</span>
                </a>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
